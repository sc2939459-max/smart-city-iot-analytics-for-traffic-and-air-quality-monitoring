<!DOCTYPE html>
<html>
<head>
    <title>Smart City IoT Analytics - Deployment</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: Arial; background:#f5f5f5; text-align:center; }
        .cards { display:flex; justify-content:center; gap:20px; margin:20px; }
        .card { background:white; padding:20px; width:180px; border-radius:10px; }
        canvas { background:white; margin:30px auto; max-width:900px; }
    </style>
</head>
<body>

<h1>Smart City IoT Analytics (Deployment)</h1>

<div class="cards">
    <div class="card">Speed<br><b id="speed">--</b> km/h</div>
    <div class="card">Density<br><b id="density">--</b></div>
    <div class="card">Congestion<br><b id="congestion">--</b></div>
    <div class="card">AQI<br><b id="aqi">--</b></div>
</div>

<canvas id="densityChart"></canvas>
<canvas id="aqiChart"></canvas>

<script>
let labels = [];
let densityData = [];
let aqiData = [];

const densityChart = new Chart(document.getElementById("densityChart"), {
    type: "line",
    data: {
        labels: labels,
        datasets: [{
            label: "Traffic Density",
            data: densityData,
            borderWidth: 2
        }]
    }
});

const aqiChart = new Chart(document.getElementById("aqiChart"), {
    type: "line",
    data: {
        labels: labels,
        datasets: [{
            label: "AQI",
            data: aqiData,
            borderWidth: 2
        }]
    }
});

function updateDashboard() {
    fetch("/api/latest")
        .then(res => res.json())
        .then(data => {
            document.getElementById("speed").innerText = data.avg_speed_kmph;
            document.getElementById("density").innerText = data.traffic_density;
            document.getElementById("congestion").innerText = data.traffic_severity;
            document.getElementById("aqi").innerText = data.predicted_aqi;

            labels.push(data.timestamp);
            densityData.push(data.traffic_density);
            aqiData.push(data.predicted_aqi);

            if (labels.length > 10) {
                labels.shift();
                densityData.shift();
                aqiData.shift();
            }

            densityChart.update();
            aqiChart.update();
        });
}

setInterval(updateDashboard, 3000);
updateDashboard();
</script>

</body>
</html>
